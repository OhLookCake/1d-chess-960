<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23222'/><text x='50' y='68' font-family='Georgia,serif' font-size='60' font-style='italic' fill='%23f5f5f5' text-anchor='middle'>e</text></svg>">
<title>1D Chess</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #1a1a2e;
    font-family: 'Segoe UI', sans-serif;
    color: #eee;
  }
  h1 {
    margin-bottom: 12px;
    font-size: 2rem;
    letter-spacing: 2px;
  }
  #status {
    margin-bottom: 20px;
    font-size: 1.1rem;
    min-height: 1.4em;
  }
  #board {
    display: flex;
    border: 3px solid #c0a060;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .square {
    width: 90px;
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
    position: relative;
  }
  .square.light { background: #f0d9b5; }
  .square.dark  { background: #b58863; }
  .square.selected { box-shadow: inset 0 0 0 4px #ffef00; }
  .square.valid-move::after {
    content: '';
    position: absolute;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.25);
  }
  .square.valid-capture {
    box-shadow: inset 0 0 0 4px rgba(255, 50, 50, 0.7);
  }
  .square.in-check {
    background: rgba(255, 0, 0, 0.5) !important;
  }
  .piece {
    width: 64px;
    height: 64px;
    cursor: default;
    filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.4));
    transition: transform 0.1s;
    pointer-events: auto;
  }
  .piece.active-turn { cursor: grab; }
  .piece.active-turn:active { cursor: grabbing; transform: scale(1.15); }
  .piece.dragging { opacity: 0.4; }
  #controls {
    margin-top: 24px;
  }
  #controls button {
    padding: 10px 28px;
    font-size: 1rem;
    border: none;
    border-radius: 6px;
    background: #c0a060;
    color: #1a1a2e;
    cursor: pointer;
    font-weight: 600;
  }
  #controls button:hover { background: #d4b674; }
  #rules {
    margin-top: 28px;
    max-width: 480px;
    font-size: 0.9rem;
    color: #bbb;
    line-height: 1.6;
  }
  #rules h2 {
    font-size: 1.1rem;
    color: #eee;
    margin-bottom: 8px;
  }
  #rules table {
    width: 100%;
    border-collapse: collapse;
  }
  #rules td {
    padding: 6px 10px;
    vertical-align: top;
    border-bottom: 1px solid #333;
  }
  #rules td:first-child {
    white-space: nowrap;
    color: #eee;
    font-weight: 600;
  }
  #rules img.rule-icon {
    width: 24px;
    height: 24px;
    vertical-align: middle;
    margin-right: 4px;
  }
</style>
</head>
<body>
<h1>1D Chess</h1>
<div id="status">White's turn</div>
<div id="board"></div>
<div id="controls">
  <button onclick="resetGame()">New Game</button>
</div>
<div id="rules">
  <h2>Movement Rules</h2>
  <table>
    <tr>
      <td><img class="rule-icon" src="pieces/white-king.svg" alt="King"> King</td>
      <td>Moves one square in either direction</td>
    </tr>
    <tr>
      <td><img class="rule-icon" src="pieces/white-knight.svg" alt="Knight"> Knight</td>
      <td>Jumps exactly two squares in either direction, leaping over any pieces in the way</td>
    </tr>
    <tr>
      <td><img class="rule-icon" src="pieces/white-rook.svg" alt="Rook"> Rook</td>
      <td>Slides any number of squares in either direction, blocked by pieces in its path</td>
    </tr>
  </table>
</div>

<script>
const PIECES = {
  WK: { svg: 'pieces/white-king.svg', color: 'white', type: 'king' },
  WN: { svg: 'pieces/white-knight.svg', color: 'white', type: 'knight' },
  WR: { svg: 'pieces/white-rook.svg', color: 'white', type: 'rook' },
  BK: { svg: 'pieces/black-king.svg', color: 'black', type: 'king' },
  BN: { svg: 'pieces/black-knight.svg', color: 'black', type: 'knight' },
  BR: { svg: 'pieces/black-rook.svg', color: 'black', type: 'rook' },
};

const INITIAL_BOARD = ['WK', 'WN', 'WR', null, null, 'BR', 'BN', 'BK'];

let board = [];
let turn = 'white';
let selectedSquare = null;
let gameOver = false;
let inCheck = false;

function resetGame() {
  board = [...INITIAL_BOARD];
  turn = 'white';
  selectedSquare = null;
  gameOver = false;
  inCheck = false;
  render();
  setStatus("White's turn");
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// Pseudo-legal moves (ignores whether own king is left in check)
function getRawMoves(from, boardState) {
  const piece = boardState[from];
  if (!piece) return [];
  const info = PIECES[piece];
  const moves = [];

  if (info.type === 'king') {
    for (const d of [-1, 1]) {
      const to = from + d;
      if (to >= 0 && to < 8) {
        const target = boardState[to];
        if (!target || PIECES[target].color !== info.color) {
          moves.push(to);
        }
      }
    }
  } else if (info.type === 'knight') {
    for (const d of [-2, 2]) {
      const to = from + d;
      if (to >= 0 && to < 8) {
        const target = boardState[to];
        if (!target || PIECES[target].color !== info.color) {
          moves.push(to);
        }
      }
    }
  } else if (info.type === 'rook') {
    for (const d of [-1, 1]) {
      let to = from + d;
      while (to >= 0 && to < 8) {
        const target = boardState[to];
        if (!target) {
          moves.push(to);
        } else if (PIECES[target].color !== info.color) {
          moves.push(to);
          break;
        } else {
          break;
        }
        to += d;
      }
    }
  }

  return moves;
}

function findKing(color, boardState) {
  for (let i = 0; i < 8; i++) {
    if (boardState[i] && PIECES[boardState[i]].color === color && PIECES[boardState[i]].type === 'king') {
      return i;
    }
  }
  return -1;
}

function isInCheck(color, boardState) {
  const kingPos = findKing(color, boardState);
  if (kingPos === -1) return false;
  const opponent = color === 'white' ? 'black' : 'white';
  for (let i = 0; i < 8; i++) {
    if (boardState[i] && PIECES[boardState[i]].color === opponent) {
      if (getRawMoves(i, boardState).includes(kingPos)) return true;
    }
  }
  return false;
}

// Legal moves: raw moves filtered to those that don't leave own king in check
function getLegalMoves(from) {
  const piece = board[from];
  if (!piece) return [];
  const color = PIECES[piece].color;
  return getRawMoves(from, board).filter(to => {
    const sim = [...board];
    sim[to] = sim[from];
    sim[from] = null;
    return !isInCheck(color, sim);
  });
}

function hasAnyLegalMoves(color) {
  for (let i = 0; i < 8; i++) {
    if (board[i] && PIECES[board[i]].color === color) {
      if (getLegalMoves(i).length > 0) return true;
    }
  }
  return false;
}

function movePiece(from, to) {
  board[to] = board[from];
  board[from] = null;

  turn = turn === 'white' ? 'black' : 'white';
  inCheck = isInCheck(turn, board);

  const hasLegal = hasAnyLegalMoves(turn);
  const turnName = turn === 'white' ? 'White' : 'Black';
  const winnerName = turn === 'white' ? 'Black' : 'White';

  if (!hasLegal) {
    gameOver = true;
    render();
    if (inCheck) {
      setStatus(`Checkmate - ${winnerName} wins`);
    } else {
      setStatus('Stalemate, draw');
    }
    return;
  }

  render();
  if (inCheck) {
    setStatus(`${turnName} is in check`);
  } else {
    setStatus(`${turnName}'s turn`);
  }
}

function onSquareClick(index) {
  if (gameOver) return;

  const piece = board[index];

  if (selectedSquare !== null) {
    const validMoves = getLegalMoves(selectedSquare);
    if (validMoves.includes(index)) {
      movePiece(selectedSquare, index);
      selectedSquare = null;
      return;
    }
    if (piece && PIECES[piece].color === turn) {
      selectedSquare = selectedSquare === index ? null : index;
      render();
      return;
    }
    selectedSquare = null;
    render();
    return;
  }

  if (piece && PIECES[piece].color === turn) {
    selectedSquare = selectedSquare === index ? null : index;
    render();
  }
}

function render() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';

  const validMoves = selectedSquare !== null ? getLegalMoves(selectedSquare) : [];
  const checkedKingPos = inCheck ? findKing(turn, board) : -1;

  for (let i = 0; i < 8; i++) {
    const sq = document.createElement('div');
    sq.className = 'square ' + (i % 2 === 0 ? 'light' : 'dark');

    if (i === selectedSquare) sq.classList.add('selected');
    if (i === checkedKingPos) sq.classList.add('in-check');
    if (validMoves.includes(i)) {
      sq.classList.add(board[i] ? 'valid-capture' : 'valid-move');
    }

    if (board[i]) {
      const img = document.createElement('img');
      img.className = 'piece';
      if (!gameOver && PIECES[board[i]].color === turn) img.classList.add('active-turn');
      img.src = PIECES[board[i]].svg;
      img.alt = board[i];
      img.draggable = true;

      img.addEventListener('dragstart', (e) => {
        if (gameOver || PIECES[board[i]].color !== turn) {
          e.preventDefault();
          return;
        }
        selectedSquare = i;
        e.dataTransfer.effectAllowed = 'move';
        img.classList.add('dragging');
        setTimeout(() => render(), 0);
      });

      sq.appendChild(img);
    }

    sq.addEventListener('click', () => onSquareClick(i));

    sq.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    });

    sq.addEventListener('drop', (e) => {
      e.preventDefault();
      if (selectedSquare !== null) {
        const validMoves = getLegalMoves(selectedSquare);
        if (validMoves.includes(i)) {
          movePiece(selectedSquare, i);
        }
        selectedSquare = null;
        render();
      }
    });

    boardEl.appendChild(sq);
  }
}

resetGame();
</script>
</body>
</html>
